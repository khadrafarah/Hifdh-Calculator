<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifdh Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141418;--surface:#1e1e25;--surface2:#25252e;--border:#33334a;
  --gold:#d4aa55;--gold-light:#eacb72;--gold-dim:#8a6f38;
  --red-bg:rgba(160,50,50,0.18);--red:#f08080;
  --amber-bg:rgba(210,170,80,0.13);--amber:var(--gold);
  --blue-bg:rgba(70,100,180,0.2);--blue:#96a8e0;
  --purple-bg:rgba(100,65,150,0.2);--purple:#c0a0f0;
  --teal-bg:rgba(35,120,110,0.2);--teal:#72cfc0;
  --green-bg:rgba(30,120,70,0.2);--green-c:#70d090;
  --pink-bg:rgba(160,65,110,0.2);--pink:#e0a0c0;
  --done-border:rgba(50,190,100,.38);
  --text:#ede9de;--text-dim:#9e9a8e;--text-muted:#5a5850;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.05) 0%,transparent 60%)}

header{text-align:center;padding:2rem 1.5rem 1.5rem;border-bottom:1px solid var(--border);position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
h1{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.subtitle{font-size:.85rem;color:var(--text-dim);margin-top:.25rem;font-style:italic}

/* INPUT */
.input-panel{max-width:720px;margin:1.5rem auto;padding:0 1rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:1.2rem 1.5rem;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:4px 0 0 4px}
.panel-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:.7rem}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
label{display:block;font-size:.7rem;letter-spacing:.08em;color:var(--text-dim);margin-bottom:.3rem;text-transform:uppercase}
select,input[type="date"]{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;padding:.45rem .7rem;color:var(--text);font-family:'EB Garamond',serif;
  font-size:.92rem;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
select:focus,input[type="date"]:focus{border-color:var(--gold-dim)}
select option{background:var(--surface2)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:.65rem;top:50%;transform:translateY(-50%);
  color:var(--gold-dim);pointer-events:none;font-size:.75rem}
.btn-gen{margin-top:1rem;width:100%;background:linear-gradient(135deg,#1e1a10,#2d2510);
  border:1px solid var(--gold-dim);color:var(--gold-light);font-family:'Cinzel',serif;
  font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:.65rem;
  border-radius:3px;cursor:pointer;transition:all .2s}
.btn-gen:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.1)}

/* DAY NAV */
.day-nav{max-width:720px;margin:0 auto 1.2rem;padding:0 1rem;display:flex;gap:.35rem}
.day-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:3px;
  color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;padding:.45rem .2rem;cursor:pointer;transition:all .2s;text-align:center}
.day-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.day-btn.active{background:linear-gradient(135deg,#1e1a10,#2a220e);border-color:var(--gold);color:var(--gold-light)}


/* SCHEDULE */
.schedule-wrap{max-width:720px;margin:0 auto;padding:0 1rem 3rem}
.day-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap}
.day-name{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold)}
.day-date{font-size:.82rem;color:var(--text-muted);font-style:italic}

/* PROGRESS */
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:.7rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.8rem}
.progress-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-dim);flex-shrink:0}
.progress-bar-bg{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));
  border-radius:2px;transition:width .4s}
.progress-pct{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);flex-shrink:0;width:32px;text-align:right}

/* ═══════════════════════
   TASK CARD — label header + content row
═══════════════════════ */
.task-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  margin-bottom:.55rem;
  overflow:hidden;
  transition:border-color .2s;
}
.task-card.done{border-color:var(--done-border);background:rgba(26,107,60,0.06)}

/* Label header bar */
.task-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.3rem .75rem;
  border-bottom:1px solid var(--border);
}
.task-cat{
  font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;
  color:inherit;
}
.cat-nma .task-header{background:var(--red-bg);border-bottom-color:rgba(139,32,32,.25)}
.cat-nma .task-cat{color:var(--red)}
.cat-rmv .task-header{background:var(--amber-bg);border-bottom-color:rgba(201,168,76,.2)}
.cat-rmv .task-cat{color:var(--amber)}
.cat-rev .task-header{background:var(--blue-bg);border-bottom-color:rgba(58,80,130,.25)}
.cat-rev .task-cat{color:var(--blue)}
.cat-prep .task-header{background:var(--teal-bg);border-bottom-color:rgba(30,100,90,.25)}
.cat-prep .task-cat{color:var(--teal)}
.cat-poq .task-header{background:var(--pink-bg);border-bottom-color:rgba(130,50,90,.25)}
.cat-poq .task-cat{color:var(--pink)}
.cat-wird .task-header{background:rgba(100,80,20,.18);border-bottom-color:rgba(100,80,20,.3)}
.cat-wird .task-cat{color:#d4b060}

/* Content row: check | page range | page count */
.task-body{
  display:grid;
  grid-template-columns:36px 1fr auto;
  align-items:center;
  min-height:44px;
}

/* Checkmark column */
.task-check{
  display:flex;align-items:center;justify-content:center;
  align-self:stretch;cursor:pointer;
  border-right:1px solid var(--border);
  transition:background .2s;
}
.task-check:hover{background:rgba(201,168,76,.06)}
.check-box{
  width:20px;height:20px;border:1px solid var(--border);border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  transition:all .2s;pointer-events:none;
}
.task-card.done .check-box{background:rgba(39,174,96,.8);border-color:rgba(39,174,96,.8);color:#fff}

/* Page range */
.task-range{
  padding:.55rem .6rem .55rem .75rem;
  line-height:1.25;min-width:0;
}
.task-range .r-pages{font-size:.98rem;color:var(--text)}
.task-range .r-surah{font-size:.82rem;color:var(--text-dim);margin-top:.1rem}
.task-card.done .r-pages{color:var(--text-dim);text-decoration:line-through}
.task-card.done .r-surah{color:var(--text-muted);text-decoration:line-through}

/* Page count */
.task-count{
  font-family:'Cinzel',serif;font-size:.65rem;color:var(--text-dim);
  padding-right:.85rem;white-space:nowrap;flex-shrink:0;
}

/* Weekend rep card */
.rep-card{
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  margin-bottom:.55rem;overflow:hidden;
  transition:border-color .2s;
}
.rep-card.all-done{border-color:var(--done-border);background:rgba(26,107,60,0.06)}

.rep-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.3rem .75rem;
  background:var(--purple-bg);
  border-bottom:1px solid rgba(80,50,120,.25);
  font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;
  color:var(--purple);
}
.rep-card.all-done .rep-header{background:var(--green-bg);border-bottom-color:rgba(30,120,70,.3);color:var(--green-c)}

.rep-body{
  display:grid;
  grid-template-columns:36px 1fr auto;
  align-items:center;
  min-height:44px;
}
.rep-check-col{
  display:flex;align-items:center;justify-content:center;
  align-self:stretch;border-right:1px solid var(--border);
}
.rep-progress{
  width:20px;height:20px;border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-family:'Cinzel',serif;color:var(--purple);pointer-events:none;
}
.rep-card.all-done .rep-progress{background:rgba(39,174,96,.8);border-color:rgba(39,174,96,.8);color:#fff}

.rep-info{padding:.55rem .6rem .55rem .75rem;min-width:0}
.rep-info .r-pages{font-size:.98rem;color:var(--text)}
.rep-info .r-surah{font-size:.82rem;color:var(--text-dim);margin-top:.1rem}
.rep-card.all-done .r-pages{color:var(--text-dim);text-decoration:line-through}
.rep-card.all-done .r-surah{color:var(--text-muted);text-decoration:line-through}

.rep-boxes{display:flex;gap:.3rem;padding:.55rem .85rem .55rem 0;align-items:center}
.rep-box{
  width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;font-family:'Cinzel',serif;font-size:.62rem;color:var(--text-muted);
  flex-shrink:0;
}
.rep-box:hover{border-color:rgba(50,190,100,.4);color:var(--green-c)}
.rep-box.done{background:var(--green-bg);border-color:rgba(50,190,100,.5);color:var(--green-c)}

/* Section label */
.section-label{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.17em;text-transform:uppercase;
  color:var(--text-muted);margin:1.1rem 0 .5rem;padding-bottom:.28rem;
  border-bottom:1px solid var(--border);
}

.ornament{text-align:center;color:var(--gold-dim);font-size:.9rem;margin:1.4rem 0;letter-spacing:.5em}
.placeholder{text-align:center;padding:3.5rem 2rem;color:var(--text-muted)}
.placeholder .icon{font-size:2rem;margin-bottom:.8rem;opacity:.35}
.placeholder p{font-style:italic;font-size:.9rem}
</style>
</head>
<body>
<header>
  <h1>Hifdh Daily Planner</h1>
  <p class="subtitle">New Hifdh · Recent Review · Distant Review · Weekly Prep · POQ Prep · Wird</p>
</header>

<div class="input-panel">
  <div class="panel">
    <div class="panel-title">Your Progress</div>
    <div class="form-grid">
      <div>
        <label>Surah Memorised Up To</label>
        <div class="sel-wrap"><select id="selSurah"></select></div>
      </div>
      <div>
        <label>Current Page (next to memorise)</label>
        <div class="sel-wrap"><select id="selPage"></select></div>
      </div>
      <div>
        <label>Daily New Hifdh Amount</label>
        <div class="sel-wrap">
          <select id="selNMA">
            <option value="0.5" selected>½ page / day</option>
            <option value="1">1 page / day</option>
            <option value="1.33">1⅓ pages / day</option>
            <option value="1.5">1½ pages / day</option>
            <option value="1.75">1¾ pages / day</option>
            <option value="2">2 pages / day</option>
          </select>
        </div>
      </div>
      <div>
        <label>Week Starting (Sunday)</label>
        <input type="date" id="dateStart">
      </div>
    </div>
    <button class="btn-gen" onclick="generate()">Generate Weekly Schedule</button>
  </div>
</div>

<div class="day-nav" id="dayNav"></div>
<div class="schedule-wrap" id="scheduleWrap">
  <div class="placeholder"><div class="icon">☾</div><p>Enter your progress above and press Generate.</p></div>
</div>

<script>
/* ── QURAN DATA ── */
const SURAHS=[
  [1,"Al-Fatihah",1],[2,"Al-Baqarah",2],[3,"Aali Imran",50],[4,"An-Nisa",77],
  [5,"Al-Ma'idah",106],[6,"Al-An'am",128],[7,"Al-A'raf",151],[8,"Al-Anfal",177],
  [9,"At-Tawbah",187],[10,"Yunus",208],[11,"Hud",221],[12,"Yusuf",235],
  [13,"Ar-Ra'd",249],[14,"Ibrahim",255],[15,"Al-Hijr",262],[16,"An-Nahl",267],
  [17,"Al-Isra",282],[18,"Al-Kahf",293],[19,"Maryam",305],[20,"Ta-Ha",312],
  [21,"Al-Anbiya",322],[22,"Al-Hajj",332],[23,"Al-Mu'minun",342],[24,"An-Nur",350],
  [25,"Al-Furqan",359],[26,"Ash-Shu'ara",367],[27,"An-Naml",377],[28,"Al-Qasas",385],
  [29,"Al-Ankabut",396],[30,"Ar-Rum",404],[31,"Luqman",411],[32,"As-Sajdah",415],
  [33,"Al-Ahzab",418],[34,"Saba",428],[35,"Fatir",434],[36,"Ya-Sin",440],
  [37,"As-Saffat",446],[38,"Sad",453],[39,"Az-Zumar",458],[40,"Ghafir",467],
  [41,"Fussilat",477],[42,"Ash-Shura",483],[43,"Az-Zukhruf",489],[44,"Ad-Dukhan",496],
  [45,"Al-Jathiyah",499],[46,"Al-Ahqaf",502],[47,"Muhammad",507],[48,"Al-Fath",511],
  [49,"Al-Hujurat",515],[50,"Qaf",518],[51,"Adh-Dhariyat",520],[52,"At-Tur",523],
  [53,"An-Najm",526],[54,"Al-Qamar",528],[55,"Ar-Rahman",531],[56,"Al-Waqi'ah",534],
  [57,"Al-Hadid",537],[58,"Al-Mujadila",542],[59,"Al-Hashr",545],[60,"Al-Mumtahanah",549],
  [61,"As-Saf",551],[62,"Al-Jumu'ah",553],[63,"Al-Munafiqun",554],[64,"At-Taghabun",556],
  [65,"At-Talaq",558],[66,"At-Tahrim",560],[67,"Al-Mulk",562],[68,"Al-Qalam",564],
  [69,"Al-Haqqah",566],[70,"Al-Ma'arij",568],[71,"Nuh",570],[72,"Al-Jinn",572],
  [73,"Al-Muzzammil",574],[74,"Al-Muddaththir",575],[75,"Al-Qiyamah",577],
  [76,"Al-Insan",578],[77,"Al-Mursalat",580],[78,"An-Naba",582],[79,"An-Nazi'at",583],
  [80,"Abasa",585],[81,"At-Takwir",586],[82,"Al-Infitar",587],[83,"Al-Mutaffifin",587],
  [84,"Al-Inshiqaq",589],[85,"Al-Buruj",590],[86,"At-Tariq",591],[87,"Al-A'la",591],
  [88,"Al-Ghashiyah",592],[89,"Al-Fajr",593],[90,"Al-Balad",594],[91,"Ash-Shams",595],
  [92,"Al-Layl",595],[93,"Ad-Duha",596],[94,"Ash-Sharh",596],[95,"At-Tin",597],
  [96,"Al-Alaq",597],[97,"Al-Qadr",598],[98,"Al-Bayyinah",598],[99,"Az-Zalzalah",599],
  [100,"Al-Adiyat",599],[101,"Al-Qari'ah",600],[102,"At-Takathur",600],[103,"Al-Asr",601],
  [104,"Al-Humazah",601],[105,"Al-Fil",601],[106,"Quraysh",602],[107,"Al-Ma'un",602],
  [108,"Al-Kawthar",602],[109,"Al-Kafirun",603],[110,"An-Nasr",603],[111,"Al-Masad",603],
  [112,"Al-Ikhlas",604],[113,"Al-Falaq",604],[114,"An-Nas",604]
];
const JUZ_PAGES=[1,22,42,62,82,102,121,142,162,182,201,221,242,262,282,302,322,342,362,382,402,422,442,462,482,502,522,542,562,582];
const TOTAL_PAGES=604;
const POQ_START=187; // At-Tawbah
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ── HELPERS ── */
function surahForPage(p){
  let s=SURAHS[0];
  for(let i=0;i<SURAHS.length;i++){if(SURAHS[i][2]<=p)s=SURAHS[i];else break;}
  return s;
}
function pageLabel(p){
  if(p<1||p>TOTAL_PAGES)return{line1:`page ${p}`,line2:''};
  return{line1:`page ${p}`,line2:surahForPage(p)[1]};
}
function rangeLabel(a,b){
  if(a>b)return{line1:'—',line2:''};
  const sa=surahForPage(a),sb=surahForPage(b);
  if(a===b)return{line1:`page ${a}`,line2:sa[1]};
  if(sa[0]===sb[0])return{line1:`pages ${a}–${b}`,line2:sa[1]};
  return{line1:`pages ${a}–${b}`,line2:`${sa[1]} – ${sb[1]}`};
}
function nmaStr(v){
  if(v<=0.5)return'½';if(v<=1)return'1';
  if(v<=1.33)return'1⅓';if(v<=1.5)return'1½';
  if(v<=1.75)return'1¾';return'2';
}
function rmvCount(nma){return nma<=0.5?5:nma<=1?10:nma<=1.5?15:20}
function drCount(mem){return mem<100?10:mem<300?20:40}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return el('div',cls);}
function ornament(){const o=div('ornament');o.innerHTML='✦ &nbsp; ✦ &nbsp; ✦';return o;}

/* ── STATE ── */
let S={surah:0,page:1,nma:0.5,weekStart:'',activeDay:0,done:{},wkdReps:{}};
function save(){localStorage.setItem('hifdhS4',JSON.stringify(S))}
function load(){try{const r=localStorage.getItem('hifdhS4');if(r)S={...S,...JSON.parse(r)};}catch(e){}}

/* ── POPULATE ── */
function populateSelects(){
  const ss=document.getElementById('selSurah');
  ss.innerHTML='<option value="0">Beginning (nothing memorised yet)</option>';
  SURAHS.forEach(([num,name],i)=>{
    const op=document.createElement('option');
    op.value=i+1;op.textContent=`${num}. ${name} (complete)`;
    ss.appendChild(op);
  });
  const sp=document.getElementById('selPage');
  sp.innerHTML='';
  for(let i=0;i<SURAHS.length;i++){
    const [num,name,startP]=SURAHS[i];
    const nextP=i+1<SURAHS.length?SURAHS[i+1][2]:TOTAL_PAGES+1;
    for(let p=startP;p<nextP&&p<=TOTAL_PAGES;p++){
      const op=document.createElement('option');
      op.value=p;op.textContent=`Page ${p} — ${name}`;
      sp.appendChild(op);
    }
  }
  const now=new Date();
  const sun=new Date(now);sun.setDate(now.getDate()-now.getDay());
  document.getElementById('dateStart').value=sun.toISOString().slice(0,10);
}

/* ── GENERATE ── */
function generate(){
  S.surah=parseInt(document.getElementById('selSurah').value)||0;
  S.page=parseInt(document.getElementById('selPage').value)||1;
  S.nma=parseFloat(document.getElementById('selNMA').value)||0.5;
  S.weekStart=document.getElementById('dateStart').value;
  S.activeDay=0;
  save();renderNav();renderDay(0);
}

/* ── NAV ── */
function renderNav(){
  const nav=document.getElementById('dayNav');
  nav.innerHTML='';
  DAYS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='day-btn'+(i===S.activeDay?' active':'')+(i>=5?' weekend':'');
    b.textContent=d.slice(0,3).toUpperCase();
    b.onclick=()=>{S.activeDay=i;renderNav();renderDay(i);};
    nav.appendChild(b);
  });
}

/* ── WEEK DATA ── */
function buildWeekData(){
  const nma=S.nma;
  const memorisedEnd=Math.max(0,S.page-1);
  const drPages=drCount(memorisedEnd);
  const days=[];
  let cursor=S.page;

  // Pre-compute NMA cursor snapshots per day for weekly prep
  const nmaCursors=[];
  let wkCursor=S.page;
  let wkFrac=0; // fractional page accumulator
  for(let d=0;d<5;d++){
    nmaCursors.push(wkCursor);
    wkFrac+=nma;
    const advance=Math.floor(wkFrac);
    wkFrac-=advance;
    wkCursor=Math.min(wkCursor+advance,TOTAL_PAGES);
  }
  // Next week's pages start where this week ends
  const nextWeekStart=wkCursor;
  const nextWeekPages=[];
  let nwCursor=nextWeekStart;
  for(let d=0;d<5;d++){
    if(nma<1){nextWeekPages.push(nwCursor);const step=Math.round(1/nma);if(d%step===step-1)nwCursor=Math.min(nwCursor+1,TOTAL_PAGES);}
    else{const n=Math.round(nma);for(let p=0;p<n;p++)nextWeekPages.push(Math.min(nwCursor+p,TOTAL_PAGES));nwCursor=Math.min(nwCursor+n,TOTAL_PAGES);}
  }
  const nextWeekUniq=[...new Set(nextWeekPages)];
  const nwFrom=nextWeekUniq[0]||nextWeekStart;
  const nwTo=nextWeekUniq[nextWeekUniq.length-1]||nextWeekStart;

  // Wird: 5 pages starting from S.page-1 going backwards (latest first)
  // Each day shifts back by 5, cycling within memorised range (page 2 to S.page-1)
  const wirdTotal=memorisedEnd-1; // pages 2..S.page-1 (Al-Baqarah onwards)

  let fracAcc=0; // fractional accumulator across days

  for(let d=0;d<7;d++){
    const isWkd=d>=5;
    let nmaPages=[],nmaFrac=false,rmvStart=0,rmvEnd=0,drFrom=0,drTo=0;

    if(!isWkd){
      // Accumulate fractional pages
      fracAcc+=nma;
      const pagesThisDay=Math.floor(fracAcc);
      fracAcc-=pagesThisDay;
      nmaFrac=(pagesThisDay===0); // true if we advance <1 page today
      if(pagesThisDay===0){
        // Half-page day: show the current page but don't advance
        nmaPages=[cursor];
      } else {
        for(let p=0;p<pagesThisDay;p++) nmaPages.push(Math.min(cursor+p,TOTAL_PAGES));
        cursor=Math.min(cursor+pagesThisDay,TOTAL_PAGES);
      }
      // On a ½-page day, advance cursor every 2 days (once fracAcc hits 1)
      // (already handled by fracAcc logic above — cursor advances when floor fires)
      // For display: if nmaFrac, we're on "half" of the current page
      const rmv=rmvCount(nma);
      rmvEnd=Math.max(...nmaPages);
      rmvStart=Math.max(1,rmvEnd-rmv+1);
    }

    // Distant review — continues all 7 days
    if(memorisedEnd>=1){
      const drRange=Math.max(1,memorisedEnd);
      const offset=(d*drPages)%drRange;
      drFrom=1+offset;
      drTo=Math.min(memorisedEnd,drFrom+drPages-1);
    }

    // Wird: 5 pages backwards from latest memorised, cycling
    let wirdFrom=0,wirdTo=0;
    if(wirdTotal>0){
      // day 0: pages (memorisedEnd-4)..memorisedEnd, day 1: shift back 5, etc.
      const wirdSize=5;
      const wirdCycleLen=Math.max(wirdSize,wirdTotal);
      const wirdOffset=(d*wirdSize)%wirdCycleLen;
      // Start from memorisedEnd going backwards
      wirdTo=Math.max(2,memorisedEnd-wirdOffset);
      wirdFrom=Math.max(2,wirdTo-wirdSize+1);
    }

    // POQ: 2 pages per day from POQ_START cycling to 604
    const poqTotal=TOTAL_PAGES-POQ_START+1; // 604-187+1=418 pages
    const poqOffset=(d*2)%poqTotal;
    const poqFrom=POQ_START+poqOffset;
    const poqTo=Math.min(TOTAL_PAGES,poqFrom+1);

    days.push({isWkd,nmaPages,nmaFrac,rmvStart,rmvEnd,drFrom,drTo,
      nwFrom,nwTo,wirdFrom,wirdTo,poqFrom,poqTo,drPages});
  }
  return days;
}

function getWeekNewPages(){
  const nma=S.nma;const pages=[];let cursor=S.page;let fracAcc=0;
  for(let d=0;d<5;d++){
    fracAcc+=nma;
    const advance=Math.floor(fracAcc);
    fracAcc-=advance;
    if(advance===0){
      pages.push(cursor);
    } else {
      for(let p=0;p<advance;p++) pages.push(Math.min(cursor+p,TOTAL_PAGES));
      cursor=Math.min(cursor+advance,TOTAL_PAGES);
    }
  }
  return[...new Set(pages)];
}

/* ── RENDER DAY ── */
function renderDay(di){
  const wrap=document.getElementById('scheduleWrap');
  wrap.innerHTML='';
  let dateStr='';
  if(S.weekStart){
    const d=new Date(S.weekStart);d.setDate(d.getDate()+di);
    dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  }
  const hdr=div('day-header');
  hdr.innerHTML=`<span class="day-name">${DAYS[di]}</span><span class="day-date">${dateStr}</span>`;
  wrap.appendChild(hdr);

  const wd=buildWeekData()[di];
  const memorisedEnd=Math.max(0,S.page-1);

  // Collect all task keys to compute progress
  const taskKeys=[];

  // ── PROGRESS (computed after building tasks) ──
  const progDiv=div('progress-wrap');
  progDiv.innerHTML=`<span class="progress-label">Today</span>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
    <span class="progress-pct" id="ppct">0%</span>`;
  wrap.appendChild(progDiv);

  /* page count helpers */
  function pageCount(a,b){ return(a&&b&&b>=a)?b-a+1:0; }
  function countLabel(n){ return n>0?`${n}`:''; }

  /* helper: make a task card */
  function makeTask(id,catClass,catLabel,rangeStr,pgFrom,pgTo,overrideCount){
    const key=`${di}-${id}`;
    taskKeys.push(key);
    const isDone=!!S.done[key];
    const cnt=overrideCount!==undefined?overrideCount:countLabel(pageCount(pgFrom,pgTo));
    const card=div('task-card '+catClass+(isDone?' done':''));
    card.id=`tcard-${key}`;

    const hdr=div('task-header');
    hdr.innerHTML=`<span class="task-cat">${catLabel}</span>`;

    const body=div('task-body');

    const chk=div('task-check');
    chk.setAttribute('role','button');
    chk.innerHTML=`<div class="check-box">${isDone?'✓':''}</div>`;
    chk.onclick=()=>toggle(key);

    const rng=div('task-range');
    rng.innerHTML=`<div class="r-pages">${rangeStr.line1}</div>${rangeStr.line2?`<div class="r-surah">${rangeStr.line2}</div>`:''}`;

    const ct=div('task-count');
    ct.textContent=cnt;

    body.appendChild(chk);
    body.appendChild(rng);
    body.appendChild(ct);

    card.appendChild(hdr);
    card.appendChild(body);
    return card;
  }

  if(!wd.isWkd){
    // ── WEEKDAY ──

    // 1. New Hifdh
    if(wd.nmaFrac){
      const lbl=pageLabel(wd.nmaPages[0]);
      wrap.appendChild(makeTask('nma','cat-nma','New Hifdh',
        lbl,wd.nmaPages[0],wd.nmaPages[0],nmaStr(S.nma)));
    } else {
      const nmaTo=wd.nmaPages[wd.nmaPages.length-1];
      wrap.appendChild(makeTask('nma','cat-nma','New Hifdh',
        rangeLabel(wd.nmaPages[0],nmaTo),wd.nmaPages[0],nmaTo,nmaStr(S.nma)));
    }

    // 2. Recent Review
    wrap.appendChild(makeTask('rmv','cat-rmv','Recent Review',
      rangeLabel(wd.rmvStart,wd.rmvEnd),wd.rmvStart,wd.rmvEnd));

    // 3. Distant Review
    if(memorisedEnd>=1&&wd.drFrom<=wd.drTo){
      wrap.appendChild(makeTask('rev','cat-rev','Distant Review',
        rangeLabel(wd.drFrom,wd.drTo),wd.drFrom,wd.drTo));
    }

    // 4. Weekly Prep
    wrap.appendChild(makeTask('prep','cat-prep','Weekly Prep',
      rangeLabel(wd.nwFrom,wd.nwTo),wd.nwFrom,wd.nwTo));

    // 5. POQ Prep
    wrap.appendChild(makeTask('poq','cat-poq','POQ Prep',
      rangeLabel(wd.poqFrom,wd.poqTo),wd.poqFrom,wd.poqTo));

    // 6. Wird
    if(wd.wirdFrom>0&&wd.wirdFrom<=wd.wirdTo){
      wrap.appendChild(makeTask('wird','cat-wird','Wird',
        rangeLabel(wd.wirdFrom,wd.wirdTo),wd.wirdFrom,wd.wirdTo));
    }

  } else {
    // ── WEEKEND ──
    const newPages=getWeekNewPages();

    // Section: This week's new hifdh ×5
    const sl1=div('section-label');
    sl1.textContent=`This Week's New Hifdh — ${newPages.length} page${newPages.length!==1?'s':''} × 5 repetitions`;
    wrap.appendChild(sl1);

    if(newPages.length===0){
      const ph=div('');
      ph.style.cssText='padding:.6rem 0;color:var(--text-muted);font-style:italic;font-size:.88rem';
      ph.textContent='No new pages yet — generate schedule first.';
      wrap.appendChild(ph);
    } else {
      newPages.forEach((pg,pi)=>wrap.appendChild(buildRepCard(di,pg,pi,taskKeys)));
    }

    // Section: Distant Review
    const sl2=div('section-label');
    sl2.style.marginTop='1rem';
    sl2.textContent='Distant Review';
    wrap.appendChild(sl2);

    if(memorisedEnd>=1&&wd.drFrom<=wd.drTo){
      wrap.appendChild(makeTask('rev','cat-rev','Distant Review',
        rangeLabel(wd.drFrom,wd.drTo),wd.drFrom,wd.drTo));
      taskKeys.push(`${di}-rev`);
      taskKeys.pop();
    }

    // Section: Weekly Prep
    const sl3=div('section-label');
    sl3.style.marginTop='1rem';
    sl3.textContent='Weekly Prep';
    wrap.appendChild(sl3);
    wrap.appendChild(makeTask('prep','cat-prep','Weekly Prep',
      rangeLabel(wd.nwFrom,wd.nwTo),wd.nwFrom,wd.nwTo));

    // Section: POQ Prep
    const sl4=div('section-label');
    sl4.style.marginTop='1rem';
    sl4.textContent='POQ Prep';
    wrap.appendChild(sl4);
    wrap.appendChild(makeTask('poq','cat-poq','POQ Prep',
      rangeLabel(wd.poqFrom,wd.poqTo),wd.poqFrom,wd.poqTo));

    // Section: Wird
    if(wd.wirdFrom>0&&wd.wirdFrom<=wd.wirdTo){
      const sl5=div('section-label');
      sl5.style.marginTop='1rem';
      sl5.textContent='Wird';
      wrap.appendChild(sl5);
      wrap.appendChild(makeTask('wird','cat-wird','Wird',
        rangeLabel(wd.wirdFrom,wd.wirdTo),wd.wirdFrom,wd.wirdTo));
    }
  }

  // Update progress bar
  const doneCount=taskKeys.filter(k=>S.done[k]).length;
  const pct=taskKeys.length?Math.round(doneCount/taskKeys.length*100):0;
  const pbar=document.getElementById('pbar');
  const ppct=document.getElementById('ppct');
  if(pbar)pbar.style.width=pct+'%';
  if(ppct)ppct.textContent=pct+'%';

  wrap.appendChild(ornament());
}

function buildRepCard(di,pg,pi,taskKeys){
  const key=`${di}-rep-${pg}`;
  let repsDone=0;
  for(let r=1;r<=5;r++)if(S.wkdReps[`${di}-p${pg}-r${r}`])repsDone++;
  const allDone=repsDone===5;
  taskKeys.push(key);
  if(allDone&&!S.done[key])S.done[key]=true;
  if(!allDone&&S.done[key])delete S.done[key];

  const card=div('rep-card'+(allDone?' all-done':''));
  card.id=`repcard-${di}-${pi}`;

  // header
  const hdr=div('rep-header');
  hdr.textContent='New Hifdh — Repetitions';
  card.appendChild(hdr);

  // body
  const body=div('rep-body');

  const chkCol=div('rep-check-col');
  chkCol.innerHTML=`<div class="rep-progress">${allDone?'✓':repsDone}</div>`;
  body.appendChild(chkCol);

  const info=div('rep-info');
  const lbl=pageLabel(pg);
  info.innerHTML=`<div class="r-pages">${lbl.line1}</div>${lbl.line2?`<div class="r-surah">${lbl.line2}</div>`:''}`;
  body.appendChild(info);

  const boxes=div('rep-boxes');
  for(let r=1;r<=5;r++){
    const k=`${di}-p${pg}-r${r}`;
    const isDone=!!S.wkdReps[k];
    const box=div('rep-box'+(isDone?' done':''));
    box.textContent=r;
    box.onclick=()=>{S.wkdReps[k]=!S.wkdReps[k];save();renderDay(S.activeDay);};
    boxes.appendChild(box);
  }
  body.appendChild(boxes);

  card.appendChild(body);
  return card;
}

/* ── TOGGLE ── */
function toggle(key){
  S.done[key]=!S.done[key];
  save();renderDay(S.activeDay);
}

/* ── INIT ── */
load();populateSelects();
document.getElementById('selSurah').value=S.surah||0;
document.getElementById('selPage').value=S.page||1;
document.getElementById('selNMA').value=S.nma||0.5;
if(S.weekStart)document.getElementById('dateStart').value=S.weekStart;

// Save inputs immediately on any change so refresh always restores them
['selSurah','selPage','selNMA','dateStart'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    S.surah=parseInt(document.getElementById('selSurah').value)||0;
    S.page=parseInt(document.getElementById('selPage').value)||1;
    S.nma=parseFloat(document.getElementById('selNMA').value)||0.5;
    S.weekStart=document.getElementById('dateStart').value;
    save();
  });
});

// Auto-generate on load if we have a saved week start
if(S.weekStart){renderNav();renderDay(S.activeDay);}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifdh Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141418;--surface:#1e1e25;--surface2:#25252e;--border:#33334a;
  --gold:#d4aa55;--gold-light:#eacb72;--gold-dim:#8a6f38;
  --red-bg:rgba(160,50,50,0.18);--red:#f08080;
  --amber-bg:rgba(210,170,80,0.13);--amber:var(--gold);
  --blue-bg:rgba(70,100,180,0.2);--blue:#96a8e0;
  --purple-bg:rgba(100,65,150,0.2);--purple:#c0a0f0;
  --teal-bg:rgba(35,120,110,0.2);--teal:#72cfc0;
  --green-bg:rgba(30,120,70,0.2);--green-c:#70d090;
  --pink-bg:rgba(160,65,110,0.2);--pink:#e0a0c0;
  --done-border:rgba(50,190,100,.38);
  --text:#ede9de;--text-dim:#9e9a8e;--text-muted:#5a5850;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.05) 0%,transparent 60%)}
header{text-align:center;padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
h1{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase}

/* TAB NAV */
.tab-nav{max-width:720px;margin:1rem auto 0;padding:0 1rem;display:flex;gap:.4rem}
.tab-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:3px;
  color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;
  text-transform:uppercase;padding:.5rem;cursor:pointer;transition:all .2s;text-align:center}
.tab-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.tab-btn.active{background:linear-gradient(135deg,#1e1a10,#2a220e);border-color:var(--gold);color:var(--gold-light)}

.tab-panel{display:none}.tab-panel.visible{display:block}

/* INPUT */
.input-panel{max-width:720px;margin:1.5rem auto;padding:0 1rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.2rem 1.5rem;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:4px 0 0 4px}
.panel-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:.7rem}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
label{display:block;font-size:.7rem;letter-spacing:.08em;color:var(--text-dim);margin-bottom:.3rem;text-transform:uppercase}
select,input[type="date"]{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;padding:.45rem .7rem;color:var(--text);font-family:'EB Garamond',serif;
  font-size:.92rem;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
select:focus,input[type="date"]:focus{border-color:var(--gold-dim)}
select option{background:var(--surface2)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:.65rem;top:50%;transform:translateY(-50%);
  color:var(--gold-dim);pointer-events:none;font-size:.75rem}
.btn-gen{margin-top:.75rem;width:100%;background:linear-gradient(135deg,#1e1a10,#2d2510);
  border:1px solid var(--gold-dim);color:var(--gold-light);font-family:'Cinzel',serif;
  font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:.65rem;
  border-radius:3px;cursor:pointer;transition:all .2s}
.btn-gen:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.1)}
.btn-danger{background:linear-gradient(135deg,#1a0a0a,#2d1010);border-color:rgba(180,50,50,.5);color:#e07070}
.btn-danger:hover{border-color:#e07070}

/* PAUSE TOGGLE */
.pause-row{display:flex;align-items:center;gap:1rem;margin-top:.75rem;padding:.7rem .9rem;
  background:var(--surface2);border:1px solid var(--border);border-radius:3px}
.pause-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);flex:1}
.pause-toggle{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.pause-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:all .25s}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:var(--text-muted);border-radius:50%;transition:all .25s}
.pause-toggle input:checked~.toggle-track{background:rgba(180,50,50,.5)}
.pause-toggle input:checked~.toggle-thumb{transform:translateX(20px);background:#e07070}
.pause-status{font-size:.82rem;color:var(--text-muted);font-style:italic}
.pause-status.active{color:#e07070}

/* DAY NAV */
.day-nav{max-width:720px;margin:0 auto 1.2rem;padding:0 1rem;display:flex;gap:.35rem}
.day-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:3px;
  color:var(--text-dim);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;padding:.45rem .2rem;cursor:pointer;transition:all .2s;text-align:center}
.day-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.day-btn.active{background:linear-gradient(135deg,#1e1a10,#2a220e);border-color:var(--gold);color:var(--gold-light)}
.schedule-wrap{max-width:720px;margin:0 auto;padding:0 1rem 3rem}
.day-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap}
.day-name{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold)}
.day-date{font-size:.82rem;color:var(--text-muted);font-style:italic}
.paused-banner{background:rgba(100,20,20,.3);border:1px solid rgba(180,50,50,.4);border-radius:4px;
  padding:.7rem 1rem;margin-bottom:1rem;font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;color:#e07070;text-align:center}
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:.7rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.8rem}
.progress-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);flex-shrink:0}
.progress-bar-bg{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .4s}
.progress-pct{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);flex-shrink:0;width:32px;text-align:right}

/* TASK CARD */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:.55rem;overflow:hidden;transition:border-color .2s}
.task-header{display:flex;align-items:center;gap:.6rem;padding:.3rem .75rem;border-bottom:1px solid var(--border)}
.task-cat{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase}
.cat-nma .task-header{background:var(--red-bg);border-bottom-color:rgba(139,32,32,.25)}.cat-nma .task-cat{color:var(--red)}
.cat-nhr .task-header{background:rgba(180,100,30,0.18);border-bottom-color:rgba(180,100,30,.25)}.cat-nhr .task-cat{color:#e8a060}
.cat-rmv .task-header{background:var(--amber-bg);border-bottom-color:rgba(201,168,76,.2)}.cat-rmv .task-cat{color:var(--amber)}
.cat-rev .task-header{background:var(--blue-bg);border-bottom-color:rgba(58,80,130,.25)}.cat-rev .task-cat{color:var(--blue)}
.cat-prep .task-header{background:var(--teal-bg);border-bottom-color:rgba(30,100,90,.25)}.cat-prep .task-cat{color:var(--teal)}
.cat-tmr .task-header{background:rgba(50,130,100,0.18);border-bottom-color:rgba(50,130,100,.25)}.cat-tmr .task-cat{color:#80d8b0}
.cat-dat .task-header{background:rgba(60,110,80,0.18);border-bottom-color:rgba(60,110,80,.25)}.cat-dat .task-cat{color:#90c8a0}
.cat-poq .task-header{background:var(--pink-bg);border-bottom-color:rgba(130,50,90,.35)}.cat-poq .task-cat{color:var(--pink)}
.cat-wird .task-header{background:rgba(100,80,20,.18);border-bottom-color:rgba(100,80,20,.3)}.cat-wird .task-cat{color:#d4b060}
.cat-carry .task-header{background:rgba(130,80,20,0.2);border-bottom-color:rgba(130,80,20,.3)}.cat-carry .task-cat{color:#e0a060}
.task-body{display:grid;grid-template-columns:54px 1fr auto;align-items:stretch;min-height:52px}
.task-actions{display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0}
.task-btn{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;
  border:none;background:transparent;color:var(--text-muted);transition:all .18s;padding:0}
.task-btn.btn-done{border-bottom:1px solid var(--border)}
.task-btn.btn-done:hover{background:rgba(39,174,96,.15);color:var(--green-c)}
.task-btn.btn-inc:hover{background:rgba(180,50,50,.15);color:#e07070}
.task-card.done{border-color:rgba(39,174,96,.5);background:rgba(26,107,60,0.12)}
.task-card.done .task-btn.btn-done{background:rgba(39,174,96,.25);color:var(--green-c)}
.task-card.done .r-pages,.task-card.done .r-surah{text-decoration:line-through;color:var(--text-dim)}
.task-card.incomplete{border-color:rgba(180,50,50,.5);background:rgba(100,20,20,0.1)}
.task-card.incomplete .task-btn.btn-inc{background:rgba(180,50,50,.22);color:#e07070}
.task-card.incomplete .r-pages,.task-card.incomplete .r-surah{color:var(--text-dim)}
.task-range{padding:.6rem .5rem .6rem .75rem;line-height:1.25;min-width:0}
.task-range .r-pages{font-size:.98rem;color:var(--text)}
.task-range .r-surah{font-size:.82rem;color:var(--text-dim);margin-top:.1rem}
.task-count{font-family:'Cinzel',serif;font-size:.65rem;color:var(--text-dim);padding-right:.85rem;white-space:nowrap;align-self:center;flex-shrink:0}

/* REP CARD */
.rep-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:.55rem;overflow:hidden}
.rep-card.all-done{border-color:var(--done-border);background:rgba(26,107,60,0.06)}
.rep-header{display:flex;align-items:center;padding:.3rem .75rem;background:var(--purple-bg);
  border-bottom:1px solid rgba(80,50,120,.25);font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;color:var(--purple)}
.rep-card.all-done .rep-header{background:var(--green-bg);border-bottom-color:rgba(30,120,70,.3);color:var(--green-c)}
.rep-body{display:grid;grid-template-columns:36px 1fr auto;align-items:center;min-height:44px}
.rep-check-col{display:flex;align-items:center;justify-content:center;align-self:stretch;border-right:1px solid var(--border)}
.rep-progress{width:20px;height:20px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-family:'Cinzel',serif;color:var(--purple);pointer-events:none}
.rep-card.all-done .rep-progress{background:rgba(39,174,96,.8);border-color:rgba(39,174,96,.8);color:#fff}
.rep-info{padding:.55rem .6rem .55rem .75rem;min-width:0}
.rep-info .r-pages{font-size:.98rem;color:var(--text)}
.rep-info .r-surah{font-size:.82rem;color:var(--text-dim);margin-top:.1rem}
.rep-card.all-done .r-pages{color:var(--text-dim);text-decoration:line-through}
.rep-boxes{display:flex;gap:.3rem;padding:.55rem .85rem .55rem 0;align-items:center}
.rep-box{width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;
  font-family:'Cinzel',serif;font-size:.62rem;color:var(--text-muted);flex-shrink:0}
.rep-box:hover{border-color:rgba(50,190,100,.4);color:var(--green-c)}
.rep-box.done{background:var(--green-bg);border-color:rgba(50,190,100,.5);color:var(--green-c)}

.section-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.17em;text-transform:uppercase;
  color:var(--text-muted);margin:1.1rem 0 .5rem;padding-bottom:.28rem;border-bottom:1px solid var(--border)}
.ornament{text-align:center;color:var(--gold-dim);font-size:.9rem;margin:1.4rem 0;letter-spacing:.5em}
.placeholder{text-align:center;padding:3.5rem 2rem;color:var(--text-muted)}
.placeholder .icon{font-size:2rem;margin-bottom:.8rem;opacity:.35}
.placeholder p{font-style:italic;font-size:.9rem}

/* ── CALENDAR ── */
.cal-wrap{max-width:720px;margin:0 auto;padding:0 1rem 3rem}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem}
.cal-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold)}
.cal-nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text-dim);
  font-family:'Cinzel',serif;font-size:.65rem;padding:.4rem .8rem;cursor:pointer;transition:all .2s}
.cal-nav-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.35rem}
.cal-day-header{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-muted);text-align:center;padding:.3rem 0}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:3px;
  padding:.45rem .4rem;min-height:90px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.cal-cell:hover{border-color:var(--gold-dim)}
.cal-cell.today{border-color:var(--gold);background:linear-gradient(135deg,#1e1a10,#1a1a20)}
.cal-cell.other-month{opacity:.35}
.cal-cell.selected{border-color:var(--gold-light)}
.cal-cell-date{font-family:'Cinzel',serif;font-size:.72rem;color:var(--text-dim);margin-bottom:.3rem}
.cal-cell.today .cal-cell-date{color:var(--gold)}
.cal-pill{font-size:.58rem;line-height:1.3;padding:.08rem .28rem;border-radius:2px;margin-bottom:.15rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim)}
.cal-pill.p-nma{background:var(--red-bg);color:var(--red)}
.cal-pill.p-rmv{background:var(--amber-bg);color:var(--gold)}
.cal-pill.p-rev{background:var(--blue-bg);color:var(--blue)}
.cal-pill.p-rep{background:var(--purple-bg);color:var(--purple)}
.cal-pill.p-wird{background:rgba(100,80,20,.2);color:#d4b060}
.cal-pill.p-paused{background:rgba(100,20,20,.2);color:#e07070}
.cal-detail{max-width:720px;margin:.5rem auto 0;padding:0 1rem}
.cal-detail-box{background:var(--surface);border:1px solid var(--gold-dim);border-radius:4px;padding:1rem 1.2rem;margin-bottom:1rem}
.cal-detail-title{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold);margin-bottom:.7rem;
  letter-spacing:.12em;text-transform:uppercase}
.cal-detail-row{display:flex;align-items:baseline;gap:.6rem;padding:.3rem 0;border-bottom:1px solid var(--border)}
.cal-detail-row:last-child{border-bottom:none}
.cal-detail-cat{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-muted);min-width:110px;flex-shrink:0}
.cal-detail-pages{font-size:.95rem;color:var(--text)}
.cal-detail-sub{font-size:.78rem;color:var(--text-dim);margin-left:.4rem}
</style>
</head>
<body>
<header><h1>Hifdh Daily Planner</h1></header>

<!-- TAB NAV -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('schedule')">Schedule</button>
  <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
  <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
</div>

<!-- SCHEDULE TAB -->
<div class="tab-panel visible" id="tab-schedule">
  <div class="day-nav" id="dayNav"></div>
  <div class="schedule-wrap" id="scheduleWrap">
    <div class="placeholder"><div class="icon">☾</div><p>Configure settings and press Generate.</p></div>
  </div>
</div>

<!-- CALENDAR TAB -->
<div class="tab-panel" id="tab-calendar">
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calShift(-1)">◀ Prev</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="cal-nav-btn" onclick="calShift(1)">Next ▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="cal-detail" id="calDetail"></div>
</div>

<!-- SETTINGS TAB -->
<div class="tab-panel" id="tab-settings">
  <div class="input-panel">
    <div class="panel">
      <div class="panel-title">Your Progress</div>
      <div class="form-grid">
        <div><label>Surah Memorised Up To</label><div class="sel-wrap"><select id="selSurah"></select></div></div>
        <div><label>Current Page (next to memorise)</label><div class="sel-wrap"><select id="selPage"></select></div></div>
        <div><label>Hifdh Start Date</label><input type="date" id="dateHifdh"></div>
        <div><label>Week Starting (Sunday)</label><input type="date" id="dateStart"></div>
      </div>
      <!-- Pause Hifdh -->
      <div class="pause-row">
        <span class="pause-label">Pause New Hifdh (Revision Mode)</span>
        <span class="pause-status" id="pauseStatus">Active</span>
        <label class="pause-toggle">
          <input type="checkbox" id="pauseToggle" onchange="togglePause()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <button class="btn-gen" onclick="generate()">Generate Weekly Schedule</button>
      <button class="btn-gen btn-danger" style="margin-top:.5rem" onclick="resetProgress()">Reset All Progress</button>
    </div>
  </div>
</div>

  [104,"Al-Humazah",601],[105,"Al-Fil",601],[106,"Quraysh",602],[107,"Al-Ma'un",602],
  [108,"Al-Kawthar",602],[109,"Al-Kafirun",603],[110,"An-Nasr",603],[111,"Al-Masad",603],
  [112,"Al-Ikhlas",604],[113,"Al-Falaq",604],[114,"An-Nas",604]
];
const JUZ_PAGES=[1,22,42,62,82,102,121,142,162,182,201,221,242,262,282,302,322,342,362,382,402,422,442,462,482,502,522,542,562,582];
const TOTAL_PAGES=604;
const POQ_START=187;
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// NMA progression: calendar weeks × 5 active days/week
// 2 weeks = 10 days, 7 weeks = 35 days each
const NMA_STEPS=[
  {days:10,  nma:0.5},   // ½ page for 2 weeks (10 active days)
  {days:45,  nma:1},     // 1 page for 7 weeks (35 active days)
  {days:80,  nma:1.33},  // 1⅓ page for 7 weeks
  {days:115, nma:1.5},   // 1½ page for 7 weeks
  {days:150, nma:1.75},  // 1¾ page for 7 weeks
  {days:9999,nma:2}      // 2 pages for remaining
];
function nmaForActiveDay(n){for(const s of NMA_STEPS)if(n<s.days)return s.nma;return 2;}

const DR_START=1;const DR_END=105;const DR_TOTAL=DR_END-DR_START+1;
const DR_SIZE=Math.ceil(DR_TOTAL/6);
const RMV_FULL_START=106;const RMV_FULL_END=176;const RMV_DAILY=2.5;
const WIRD_START=1;const WIRD_END=176;const WIRD_TOTAL=WIRD_END-WIRD_START+1;const WIRD_SIZE=5;

function juzForPage(p){
  let juz=1;
  for(let i=0;i<JUZ_PAGES.length;i++){if(JUZ_PAGES[i]<=p)juz=i+1; else break;}
  const juzStart=JUZ_PAGES[juz-1];
  return{juz,pageInJuz:p-juzStart+1};
}
function surahForPage(p){let s=SURAHS[0];for(let i=0;i<SURAHS.length;i++){if(SURAHS[i][2]<=p)s=SURAHS[i];else break;}return s;}
function pageLabel(p){if(p<1||p>TOTAL_PAGES)return{line1:`page ${p}`,line2:''};return{line1:`page ${p}`,line2:surahForPage(p)[1]};}
function rangeLabel(a,b){
  if(a>b)return{line1:'—',line2:''};
  const sa=surahForPage(a),sb=surahForPage(b);
  if(a===b)return{line1:`page ${a}`,line2:sa[1]};
  if(sa[0]===sb[0])return{line1:`pages ${a}–${b}`,line2:sa[1]};
  return{line1:`pages ${a}–${b}`,line2:`${sa[1]} – ${sb[1]}`};
}
function rangeTxt(a,b){const r=rangeLabel(a,b);return r.line2?`${r.line1} · ${r.line2}`:r.line1;}
function nmaStr(v){if(v<=0.5)return'½';if(v<=1)return'1';if(v<=1.34)return'1⅓';if(v<=1.5)return'1½';if(v<=1.75)return'1¾';return'2';}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return el('div',cls);}
function ornament(){const o=div('ornament');o.innerHTML='✦ &nbsp; ✦ &nbsp; ✦';return o;}

function activeDay(fromDate,toDate){
  if(!fromDate||!toDate)return 0;
  const f=new Date(fromDate),t=new Date(toDate);
  if(t<f)return 0;
  let count=0;const cur=new Date(f);
  while(cur<=t){const dow=cur.getDay();if(dow>=0&&dow<=4)count++;cur.setDate(cur.getDate()+1);}
  return count;
}

/* STATE */
let S={surah:0,page:1,weekStart:'',activeDay:0,done:{},wkdReps:{},rmvStartDate:'',hifdhStartDate:'',incomplete:{},hifdhPaused:false,pausedSince:''};
let calViewDate=new Date();
let calSelectedDate=null;

/* NMA ON DATE */
function nmaOnDate(dateStr){
  if(!S.hifdhStartDate||!dateStr)return 0.5;
  const ref=new Date(S.hifdhStartDate);
  const tgt=new Date(dateStr);tgt.setDate(tgt.getDate()-1);
  if(tgt<ref)return 0.5;
  const n=activeDay(ref,tgt);
  return nmaForActiveDay(n);
}

/* BUILD WEEK DATA */
function buildWeekData(){
  const memorisedEnd=Math.max(0,S.page-1);
  const days=[];let cursor=S.page;let fracAcc=S._startFracAcc||0;
  function nmaForDay(d){
    if(!S.weekStart||!S.hifdhStartDate)return 0.5;
    const wd=new Date(S.weekStart);wd.setDate(wd.getDate()+d);
    return nmaOnDate(wd.toISOString().slice(0,10));
  }
  let wkCursor=S.page,wkFrac=0;
  for(let d=0;d<5;d++){
    const nma=nmaForDay(d);wkFrac+=nma;const adv=Math.floor(wkFrac);wkFrac-=adv;
    wkCursor=Math.min(wkCursor+adv,TOTAL_PAGES);
  }
  let nwCursor=wkCursor,nwFrac=0;const nextWeekPages=[];
  for(let d=0;d<5;d++){
    const nma=nmaForDay(d);nwFrac+=nma;const adv=Math.floor(nwFrac);nwFrac-=adv;
    if(adv===0)nextWeekPages.push(nwCursor);
    else for(let p=0;p<adv;p++)nextWeekPages.push(Math.min(nwCursor+p,TOTAL_PAGES));
    nwCursor=Math.min(nwCursor+adv,TOTAL_PAGES);
  }
  const nwUniq=[...new Set(nextWeekPages)];
  const nwFrom=nwUniq[0]||wkCursor,nwTo=nwUniq[nwUniq.length-1]||wkCursor;

  for(let d=0;d<7;d++){
    const isSat=d===6;const isFri=d===5;
    const nma=(isSat||isFri||S.hifdhPaused)?0:nmaForDay(d);
    let nmaPages=[],nmaFrac=false,nhrFrom=0,nhrTo=0,nhrTopFrac=null;

    if(d<5&&!S.hifdhPaused){
      const fracAccBefore=fracAcc;
      fracAcc+=nma;const pagesThisDay=Math.floor(fracAcc);fracAcc-=pagesThisDay;
      nmaFrac=(pagesThisDay===0);
      if(pagesThisDay===0){nmaPages=[cursor];}
      else{for(let p=0;p<pagesThisDay;p++)nmaPages.push(Math.min(cursor+p,TOTAL_PAGES));cursor=Math.min(cursor+pagesThisDay,TOTAL_PAGES);}
      const nhrRangeStart=177;
      let nhrRangeEnd=d>0?(fracAccBefore>0?nmaPages[0]:nmaPages[0]-1):memorisedEnd;
      if(nhrRangeEnd>=nhrRangeStart){
        nhrFrom=nhrRangeStart;nhrTo=nhrRangeEnd;
        if(fracAccBefore>0&&nhrTo===nmaPages[0])nhrTopFrac=nmaStr(fracAccBefore);
      }
    } else if(d<5&&S.hifdhPaused){
      fracAcc=0; // don't advance cursor
    }

    let rmvFrom=0,rmvTo=0;
    if(!isSat){
      let rmvCumulDay=0;
      if(S.rmvStartDate&&S.weekStart){
        const refDate=new Date(S.rmvStartDate);
        const weekDate=new Date(S.weekStart);weekDate.setDate(weekDate.getDate()+d);
        const diffDays=Math.floor((weekDate-refDate)/(1000*60*60*24));
        if(diffDays>=0)rmvCumulDay=diffDays;
      } else rmvCumulDay=d;
      const rmvSize=Math.min(Math.floor(RMV_DAILY*(rmvCumulDay+1)),RMV_FULL_END-RMV_FULL_START+1);
      rmvFrom=RMV_FULL_START;rmvTo=Math.min(RMV_FULL_END,RMV_FULL_START+rmvSize-1);
    }

    let drFrom=0,drTo=0,drFrom2=0,drTo2=0;
    if(!isSat){
      const drDayIdx=d%6;
      drFrom=DR_START+drDayIdx*DR_SIZE;drTo=drFrom+DR_SIZE-1;
      if(drTo>DR_END){const overflow=drTo-DR_END;drTo=DR_END;drFrom2=DR_START;drTo2=DR_START+overflow-1;}
    }

    const wirdOffset=(d*WIRD_SIZE)%WIRD_TOTAL;
    const wirdFrom=WIRD_START+wirdOffset;
    const wirdTo=Math.min(WIRD_END,wirdFrom+WIRD_SIZE-1);

    const poqTotal=TOTAL_PAGES-POQ_START+1;
    const poqFrom=POQ_START+(d*2)%poqTotal;
    const poqTo=Math.min(TOTAL_PAGES,poqFrom+1);

    let tmrPages=[],datPages=[];
    if(!S.hifdhPaused){
      let tc=cursor,tf=fracAcc;
      const advDay=(di2)=>{
        const n=nmaForDay(di2);tf+=n;const adv=Math.floor(tf);tf-=adv;
        const pgs=[];
        if(adv===0)pgs.push(tc);
        else{for(let p=0;p<adv;p++)pgs.push(Math.min(tc+p,TOTAL_PAGES));tc=Math.min(tc+adv,TOTAL_PAGES);}
        return pgs;
      };
      if(d<5){if(d+1<=4)tmrPages=advDay(d+1);else if(d+1===5)advDay(5);if(d+2<=4)datPages=advDay(d+2);}
      else if(d===5){datPages=advDay(0);}
      else if(d===6){tmrPages=advDay(0);datPages=advDay(1);}
    }

    days.push({isSat,isFri,nma,nmaPages,nmaFrac,rmvFrom,rmvTo,drFrom,drTo,drFrom2,drTo2,
      nhrFrom,nhrTo,nhrTopFrac,nwFrom,nwTo,wirdFrom,wirdTo,poqFrom,poqTo,tmrPages,datPages});
  }
  return days;
}

/* Compute cursor and fracAcc at the start of a given Sunday */
function stateAtDate(targetSundayStr){
  if(!S.weekStart||!targetSundayStr)return{page:S.page,fracAcc:0};
  const baseDate=new Date(S.weekStart);baseDate.setHours(0,0,0,0);
  const targetDate=new Date(targetSundayStr);targetDate.setHours(0,0,0,0);
  if(targetDate<=baseDate)return{page:S.page,fracAcc:0};
  let cursor=S.page,fracAcc=0;
  let cur=new Date(baseDate);
  while(cur<targetDate){
    const dow=cur.getDay();
    if(dow>=0&&dow<=4&&!S.hifdhPaused){
      const nma=nmaOnDate(cur.toISOString().slice(0,10));
      fracAcc+=nma;const adv=Math.floor(fracAcc);fracAcc-=adv;
      cursor=Math.min(cursor+adv,TOTAL_PAGES);
    }
    cur.setDate(cur.getDate()+1);
  }
  return{page:cursor,fracAcc};
}

function buildWeekDataForDate(targetSundayStr){
  if(!targetSundayStr)return buildWeekData();
  const{page,fracAcc}=stateAtDate(targetSundayStr);
  const savedPage=S.page;const savedWeekStart=S.weekStart;
  S.page=page;S._startFracAcc=fracAcc;
  S.weekStart=targetSundayStr;
  const days=buildWeekData();
  S.page=savedPage;S.weekStart=savedWeekStart;delete S._startFracAcc;
  return days;
}

function getWeekNewPages(){
  if(S.hifdhPaused)return[];
  let cursor=S.page,fracAcc=0;const pages=[];
  for(let d=0;d<5;d++){
    const nma=S.weekStart&&S.hifdhStartDate?nmaOnDate(new Date(new Date(S.weekStart).setDate(new Date(S.weekStart).getDate()+d)).toISOString().slice(0,10)):0.5;
    fracAcc+=nma;const adv=Math.floor(fracAcc);fracAcc-=adv;
    if(adv===0)pages.push(cursor);
    else{for(let p=0;p<adv;p++)pages.push(Math.min(cursor+p,TOTAL_PAGES));cursor=Math.min(cursor+adv,TOTAL_PAGES);}
  }
  return[...new Set(pages)];
}

/* ── RENDER DAY ── */
function renderDay(di){
  const wrap=document.getElementById('scheduleWrap');
  wrap.innerHTML='';
  let dateStr='';
  if(S.weekStart){
    const d=new Date(S.weekStart);d.setDate(d.getDate()+di);
    dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  }
  const hdr=div('day-header');
  hdr.innerHTML=`<span class="day-name">${DAYS[di]}</span><span class="day-date">${dateStr}</span>`;
  wrap.appendChild(hdr);

  if(S.hifdhPaused){
    const banner=div('paused-banner');
    banner.textContent='⏸ Hifdh Paused — Revision Mode Active';
    wrap.appendChild(banner);
  }

  const wd=buildWeekData()[di];
  const taskKeys=[];
  const progDiv=div('progress-wrap');
  progDiv.innerHTML=`<span class="progress-label">Today</span>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
    <span class="progress-pct" id="ppct">0%</span>
    <span id="daily-total" style="font-family:'Cinzel',serif;font-size:.6rem;color:var(--text-dim);flex-shrink:0;margin-left:.5rem;white-space:nowrap"></span>`;
  wrap.appendChild(progDiv);

  function pageCount(a,b){return(a&&b&&b>=a)?b-a+1:0;}
  const dailyNums=[];
  function trackPages(a,b,ov){if(ov!==undefined){const n=parseFloat(ov);if(!isNaN(n))dailyNums.push(n);}else if(a&&b&&b>=a)dailyNums.push(b-a+1);}

  function makeTask(id,catClass,catLabel,rangeStr,pgFrom,pgTo,overrideCount,noCarry=false){
    const key=`${di}-${id}`;taskKeys.push(key);
    const isDone=!!S.done[key];
    const isInc=!isDone&&!!(S.incomplete&&S.incomplete[key]);
    const cnt=overrideCount!==undefined?overrideCount:(pageCount(pgFrom,pgTo)>0?String(pageCount(pgFrom,pgTo)):'');
    const stateClass=isDone?' done':isInc?' incomplete':'';
    const card=div('task-card '+catClass+stateClass);card.id=`tcard-${key}`;
    const h=div('task-header');h.innerHTML=`<span class="task-cat">${catLabel}</span>`;
    const body=div('task-body');
    const actions=div('task-actions');
    const btnDone=el('button','task-btn btn-done');btnDone.textContent='✓';btnDone.title='Complete';
    btnDone.onclick=(e)=>{e.stopPropagation();toggleDone(key);};
    const btnInc=el('button','task-btn btn-inc');btnInc.textContent='✗';btnInc.title='Incomplete';
    btnInc.onclick=(e)=>{e.stopPropagation();toggleIncomplete(key,catLabel,rangeStr,noCarry);};
    actions.appendChild(btnDone);actions.appendChild(btnInc);
    const rng=div('task-range');
    rng.innerHTML=`<div class="r-pages">${rangeStr.line1}</div>${rangeStr.line2?`<div class="r-surah">${rangeStr.line2}</div>`:''}`;
    const ct=div('task-count');ct.textContent=cnt;
    body.appendChild(actions);body.appendChild(rng);body.appendChild(ct);
    card.appendChild(h);card.appendChild(body);return card;
  }

  function renderRMV(sfx=''){
    if(wd.rmvFrom>0&&wd.rmvFrom<=wd.rmvTo){
      wrap.appendChild(makeTask('rmv'+sfx,'cat-rmv','Recent Review',rangeLabel(wd.rmvFrom,wd.rmvTo),wd.rmvFrom,wd.rmvTo));
      trackPages(wd.rmvFrom,wd.rmvTo);
    }
  }
  function renderDR(sfx=''){
    const tDR=(wd.drTo-wd.drFrom+1)+(wd.drFrom2>0?wd.drTo2-wd.drFrom2+1:0);
    const drRS=wd.drFrom2>0?
      {line1:`${rangeLabel(wd.drFrom,wd.drTo).line1} & ${rangeLabel(wd.drFrom2,wd.drTo2).line1}`,
       line2:`${rangeLabel(wd.drFrom,wd.drTo).line2} & ${rangeLabel(wd.drFrom2,wd.drTo2).line2}`}:
      rangeLabel(wd.drFrom,wd.drTo);
    wrap.appendChild(makeTask('rev'+sfx,'cat-rev','Distant Review',drRS,wd.drFrom,wd.drTo,String(tDR)));
    trackPages(0,0,String(tDR));
  }

  const prevDi=(di+6)%7;
  const carriedKeys=Object.keys(S.incomplete||{}).filter(k=>k.startsWith(`${prevDi}-`)&&!k.startsWith('carry-')&&!S.incomplete[k]?.noCarry);
  const hasCarried=carriedKeys.length>0;

  if(!wd.isSat&&!wd.isFri){
    if(!S.hifdhPaused){
      if(wd.nmaFrac){
        const lbl=pageLabel(wd.nmaPages[0]);
        wrap.appendChild(makeTask('nma','cat-nma','New Hifdh',lbl,wd.nmaPages[0],wd.nmaPages[0],nmaStr(wd.nma)));
        trackPages(wd.nmaPages[0],wd.nmaPages[0],nmaStr(wd.nma));
      } else if(wd.nmaPages.length>0){
        const nmaTo=wd.nmaPages[wd.nmaPages.length-1];
        wrap.appendChild(makeTask('nma','cat-nma','New Hifdh',rangeLabel(wd.nmaPages[0],nmaTo),wd.nmaPages[0],nmaTo,nmaStr(wd.nma)));
        trackPages(wd.nmaPages[0],nmaTo,nmaStr(wd.nma));
      }
      if(wd.nhrFrom>0&&wd.nhrFrom<=wd.nhrTo){
        let nhrCount;if(wd.nhrTopFrac!==null){const w=wd.nhrTo-wd.nhrFrom;nhrCount=w>0?`${w}${wd.nhrTopFrac}`:wd.nhrTopFrac;}
        wrap.appendChild(makeTask('nhr','cat-nhr','New Hifdh Review',rangeLabel(wd.nhrFrom,wd.nhrTo),wd.nhrFrom,wd.nhrTo,nhrCount));
        trackPages(wd.nhrFrom,wd.nhrTo,nhrCount);
      }
    }
    wrap.appendChild(makeTask('poq','cat-poq','POQ Prep',rangeLabel(wd.poqFrom,wd.poqTo),wd.poqFrom,wd.poqTo));trackPages(wd.poqFrom,wd.poqTo);
    wrap.appendChild(makeTask('wird','cat-wird','Wird',rangeLabel(wd.wirdFrom,wd.wirdTo),wd.wirdFrom,wd.wirdTo));trackPages(wd.wirdFrom,wd.wirdTo);
    if(!S.hifdhPaused){
      if(wd.tmrPages.length>0){const tf=wd.tmrPages[0],tt=wd.tmrPages[wd.tmrPages.length-1];wrap.appendChild(makeTask('tmr','cat-tmr',"Tomorrow's Page",tf===tt?pageLabel(tf):rangeLabel(tf,tt),tf,tt,undefined,true));trackPages(tf,tt);}
      if(wd.datPages.length>0){const df=wd.datPages[0],dt=wd.datPages[wd.datPages.length-1];wrap.appendChild(makeTask('dat','cat-dat',"Day After Tomorrow's Page",df===dt?pageLabel(df):rangeLabel(df,dt),df,dt,undefined,true));trackPages(df,dt);}
    }
  } else if(wd.isFri){
    if(!S.hifdhPaused){
      const newPages=getWeekNewPages();
      const sl1=div('section-label');sl1.textContent=`This Week's New Hifdh — ×3`;wrap.appendChild(sl1);
      if(newPages.length===0){const ph=div('');ph.style.cssText='padding:.6rem 0;color:var(--text-muted);font-style:italic;font-size:.88rem';ph.textContent='No new pages yet.';wrap.appendChild(ph);}
      else newPages.forEach((pg,pi)=>{wrap.appendChild(buildRepCard(di,pg,pi,taskKeys,3));trackPages(pg,pg,'3');});
    }
    wrap.appendChild(makeTask('poq','cat-poq','POQ Prep',rangeLabel(wd.poqFrom,wd.poqTo),wd.poqFrom,wd.poqTo));trackPages(wd.poqFrom,wd.poqTo);
    wrap.appendChild(makeTask('wird','cat-wird','Wird',rangeLabel(wd.wirdFrom,wd.wirdTo),wd.wirdFrom,wd.wirdTo));trackPages(wd.wirdFrom,wd.wirdTo);
    if(!S.hifdhPaused&&wd.datPages.length>0){const df=wd.datPages[0],dt=wd.datPages[wd.datPages.length-1];const sl7=div('section-label');sl7.style.marginTop='1rem';sl7.textContent="Day After Tomorrow's Page";wrap.appendChild(sl7);wrap.appendChild(makeTask('dat','cat-dat',"Day After Tomorrow's Page",df===dt?pageLabel(df):rangeLabel(df,dt),df,dt,undefined,true));trackPages(df,dt);}
  } else {
    if(!S.hifdhPaused){
      const newPages=getWeekNewPages();
      const sl1=div('section-label');sl1.textContent=`This Week's New Hifdh — ×5`;wrap.appendChild(sl1);
      if(newPages.length===0){const ph=div('');ph.style.cssText='padding:.6rem 0;color:var(--text-muted);font-style:italic;font-size:.88rem';ph.textContent='No new pages yet.';wrap.appendChild(ph);}
      else newPages.forEach((pg,pi)=>{wrap.appendChild(buildRepCard(di,pg,pi,taskKeys,5));trackPages(pg,pg,'5');});
    }
    wrap.appendChild(makeTask('prep','cat-prep','Weekly Prep',rangeLabel(wd.nwFrom,wd.nwTo),wd.nwFrom,wd.nwTo,undefined,true));trackPages(wd.nwFrom,wd.nwTo);
    wrap.appendChild(makeTask('poq','cat-poq','POQ Prep',rangeLabel(wd.poqFrom,wd.poqTo),wd.poqFrom,wd.poqTo));trackPages(wd.poqFrom,wd.poqTo);
    wrap.appendChild(makeTask('wird','cat-wird','Wird',rangeLabel(wd.wirdFrom,wd.wirdTo),wd.wirdFrom,wd.wirdTo));trackPages(wd.wirdFrom,wd.wirdTo);
    if(!S.hifdhPaused){
      if(wd.tmrPages.length>0){const tf=wd.tmrPages[0],tt=wd.tmrPages[wd.tmrPages.length-1];const sl5=div('section-label');sl5.style.marginTop='1rem';sl5.textContent="Tomorrow's Page";wrap.appendChild(sl5);wrap.appendChild(makeTask('tmr','cat-tmr',"Tomorrow's Page",tf===tt?pageLabel(tf):rangeLabel(tf,tt),tf,tt,undefined,true));trackPages(tf,tt);}
      if(wd.datPages.length>0){const df=wd.datPages[0],dt=wd.datPages[wd.datPages.length-1];const sl6=div('section-label');sl6.style.marginTop='1rem';sl6.textContent="Day After Tomorrow's Page";wrap.appendChild(sl6);wrap.appendChild(makeTask('dat','cat-dat',"Day After Tomorrow's Page",df===dt?pageLabel(df):rangeLabel(df,dt),df,dt,undefined,true));trackPages(df,dt);}
    }
  }

  if(hasCarried){
    const slInc=div('section-label');slInc.style.marginTop='1.2rem';slInc.style.borderBottomColor='rgba(180,50,50,.4)';slInc.style.color='#e07070';
    slInc.textContent='Incomplete Tasks (from yesterday)';wrap.appendChild(slInc);
    carriedKeys.forEach(k=>{
      const info=S.incomplete[k];if(!info)return;
      const carryKey=`carry-${di}-${k}`;taskKeys.push(carryKey);
      const isDone=!!S.done[carryKey];
      const card=div('task-card cat-carry'+(isDone?' done':''));card.id=`tcard-${carryKey}`;
      const h=div('task-header');h.innerHTML=`<span class="task-cat">${info.label}</span>`;
      const body=div('task-body');
      const actions=div('task-actions');
      const btnDone=el('button','task-btn btn-done');btnDone.textContent='✓';btnDone.onclick=(e)=>{e.stopPropagation();toggleDone(carryKey);};
      const btnInc=el('button','task-btn btn-inc');btnInc.textContent='✗';btnInc.onclick=(e)=>{e.stopPropagation();delete S.incomplete[k];save();renderDay(S.activeDay);};
      actions.appendChild(btnDone);actions.appendChild(btnInc);
      const rng=div('task-range');rng.innerHTML=`<div class="r-pages">${info.line1}</div>${info.line2?`<div class="r-surah">${info.line2}</div>`:''}`;
      const ct=div('task-count');ct.textContent='';
      body.appendChild(actions);body.appendChild(rng);body.appendChild(ct);card.appendChild(h);card.appendChild(body);wrap.appendChild(card);
    });
  }

  const doneCount=taskKeys.filter(k=>S.done[k]).length;
  const pct=taskKeys.length?Math.round(doneCount/taskKeys.length*100):0;
  const pbar=document.getElementById('pbar');const ppct=document.getElementById('ppct');
  if(pbar)pbar.style.width=pct+'%';if(ppct)ppct.textContent=pct+'%';
  const totalPgs=dailyNums.reduce((a,b)=>a+b,0);
  const tel=document.getElementById('daily-total');
  if(tel)tel.textContent=`${Math.round(totalPgs*10)/10} pages`;
  wrap.appendChild(ornament());
}

function buildRepCard(di,pg,pi,taskKeys,maxReps=5){
  const key=`${di}-rep-${pg}`;
  let repsDone=0;for(let r=1;r<=maxReps;r++)if(S.wkdReps[`${di}-p${pg}-r${r}`])repsDone++;
  const allDone=repsDone===maxReps;
  taskKeys.push(key);if(allDone&&!S.done[key])S.done[key]=true;if(!allDone&&S.done[key])delete S.done[key];
  const card=div('rep-card'+(allDone?' all-done':''));card.id=`repcard-${di}-${pi}`;
  const h=div('rep-header');h.textContent='New Hifdh — Repetitions';card.appendChild(h);
  const body=div('rep-body');
  const chkCol=div('rep-check-col');chkCol.innerHTML=`<div class="rep-progress">${allDone?'✓':repsDone}</div>`;body.appendChild(chkCol);
  const info=div('rep-info');const lbl=pageLabel(pg);
  info.innerHTML=`<div class="r-pages">${lbl.line1}</div>${lbl.line2?`<div class="r-surah">${lbl.line2}</div>`:''}`;body.appendChild(info);
  const boxes=div('rep-boxes');
  for(let r=1;r<=maxReps;r++){
    const k=`${di}-p${pg}-r${r}`;const isDone=!!S.wkdReps[k];
    const box=div('rep-box'+(isDone?' done':''));box.textContent=r;
    box.onclick=()=>{S.wkdReps[k]=!S.wkdReps[k];save();renderDay(S.activeDay);};
    boxes.appendChild(box);
  }
  body.appendChild(boxes);card.appendChild(body);return card;
}

/* ── CALENDAR ── */
function renderCalendar(){
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  document.getElementById('calTitle').textContent=`${MONTHS[m]} ${y}`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{
    const h=div('cal-day-header');h.textContent=d;grid.appendChild(h);
  });
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);

  // pad start
  for(let i=0;i<firstDay;i++){
    const blank=div('cal-cell other-month');grid.appendChild(blank);
  }

  for(let d=1;d<=daysInMonth;d++){
    const cellDate=new Date(y,m,d);
    const cell=div('cal-cell');
    if(cellDate.getTime()===today.getTime())cell.classList.add('today');
    if(calSelectedDate&&cellDate.toDateString()===calSelectedDate.toDateString())cell.classList.add('selected');

    const dateLabel=div('cal-cell-date');dateLabel.textContent=d;cell.appendChild(dateLabel);

    // Build pills for this date
    const pills=buildCalPills(cellDate);
    pills.forEach(p=>{
      const pill=div('cal-pill '+p.cls);pill.textContent=p.text;cell.appendChild(pill);
    });

    cell.onclick=()=>{calSelectedDate=cellDate;renderCalendar();renderCalDetail(cellDate);};
    grid.appendChild(cell);
  }
}

function calShift(dir){
  calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+dir,1);
  renderCalendar();
  document.getElementById('calDetail').innerHTML='';
}

function buildCalPills(date){
  if(!S.weekStart)return[];
  const dow=date.getDay(); // 0=Sun..6=Sat
  const isSat=dow===6;
  const pills=[];

  // Figure out which week offset this date is from the weekStart
  const ws=new Date(S.weekStart);ws.setHours(0,0,0,0);
  const dateH=new Date(date);dateH.setHours(0,0,0,0);
  const diffDays=Math.round((dateH-ws)/(1000*60*60*24));
  // diffDays: 0=Sun of this week, 1=Mon, ... 6=Sat, 7=next Sun, etc.
  const di=((diffDays%7)+7)%7; // day index 0-6

  if(S.hifdhPaused){
    pills.push({cls:'p-paused',text:'Paused'});
  } else if(dow<5){
    pills.push({cls:'p-nma',text:'New Hifdh'});
  }

  if(dow===5||dow===6){
    pills.push({cls:'p-rep',text:dow===5?'Reps ×3':'Reps ×5'});
  }

  pills.push({cls:'p-wird',text:'Wird'});
  return pills;
}

function renderCalDetail(date){
  const container=document.getElementById('calDetail');container.innerHTML='';
  if(!S.weekStart)return;

  const ws=new Date(S.weekStart);ws.setHours(0,0,0,0);
  const dateH=new Date(date);dateH.setHours(0,0,0,0);
  const diffDays=Math.round((dateH-ws)/(1000*60*60*24));
  const di=((diffDays%7)+7)%7;
  const dow=date.getDay();
  const isSat=dow===6;const isFri=dow===5;

  // Find the Sunday of the selected week
  const selectedWeekSun=new Date(date);selectedWeekSun.setDate(date.getDate()-di);
  const selectedWeekSunStr=selectedWeekSun.toISOString().slice(0,10);
  const wd=buildWeekDataForDate(selectedWeekSunStr)[di];

  const box=div('cal-detail-box');
  const title=div('cal-detail-title');
  title.textContent=date.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  box.appendChild(title);

  function addRow(cat,pages,sub){
    const row=div('cal-detail-row');
    row.innerHTML=`<span class="cal-detail-cat">${cat}</span><span class="cal-detail-pages">${pages}</span><span class="cal-detail-sub">${sub||''}</span>`;
    box.appendChild(row);
  }

  if(S.hifdhPaused){addRow('Status','Hifdh Paused','Revision mode');}
  else if(!isSat&&!isFri&&wd.nmaPages.length>0){
    const nmaTo=wd.nmaPages[wd.nmaPages.length-1];
    const r=wd.nmaFrac?pageLabel(wd.nmaPages[0]):rangeLabel(wd.nmaPages[0],nmaTo);
    addRow('New Hifdh',r.line1,r.line2);
  }

  if(isFri||isSat){
    const{page,fracAcc}=stateAtDate(selectedWeekSunStr);
    const savedPage=S.page,savedWS=S.weekStart,savedFrac=S._startFracAcc;
    S.page=page;S.weekStart=selectedWeekSunStr;S._startFracAcc=fracAcc;
    const newPages=getWeekNewPages();
    S.page=savedPage;S.weekStart=savedWS;
    if(savedFrac!==undefined)S._startFracAcc=savedFrac;else delete S._startFracAcc;
    addRow(isFri?'Reps ×3':'Reps ×5',newPages.length?`${newPages.length} page${newPages.length!==1?'s':''}`:'-','New Hifdh pages');
  }

  const wr=rangeLabel(wd.wirdFrom,wd.wirdTo);
  addRow('Wird',wr.line1,wr.line2);

  const pr=rangeLabel(wd.poqFrom,wd.poqTo);
  addRow('POQ Prep',pr.line1,pr.line2);

  container.appendChild(box);
}

function toggleDone(key){
  S.done[key]=!S.done[key];
  if(S.done[key]&&S.incomplete&&S.incomplete[key])delete S.incomplete[key];
  save();renderDay(S.activeDay);
}
function toggleIncomplete(key,label,rangeStr,noCarry=false){
  if(!S.incomplete)S.incomplete={};
  if(S.incomplete[key]){delete S.incomplete[key];}
  else{S.incomplete[key]={label,line1:rangeStr.line1,line2:rangeStr.line2||'',noCarry:!!noCarry};}
  if(S.incomplete[key]&&S.done[key])delete S.done[key];
  save();renderDay(S.activeDay);
}
function resetProgress(){
  if(!confirm('Reset all completed, incomplete and carried-over tasks? Your settings will be kept.'))return;
  S.done={};S.wkdReps={};S.incomplete={};save();renderDay(S.activeDay);
}
function toggle(key){toggleDone(key);}

/* ── INIT ── */
load();populateSelects();
document.getElementById('selSurah').value=S.surah||0;
document.getElementById('selPage').value=S.page||1;
if(S.weekStart)document.getElementById('dateStart').value=S.weekStart;
if(S.hifdhStartDate)document.getElementById('dateHifdh').value=S.hifdhStartDate;
updatePauseUI();

['selSurah','selPage','dateStart','dateHifdh'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    S.surah=parseInt(document.getElementById('selSurah').value)||0;
    S.page=parseInt(document.getElementById('selPage').value)||1;
    S.weekStart=document.getElementById('dateStart').value;
    S.hifdhStartDate=document.getElementById('dateHifdh').value||S.weekStart;
    save();
  });
});

if(S.weekStart){S.activeDay=new Date().getDay();renderNav();renderDay(S.activeDay);}
</script>
